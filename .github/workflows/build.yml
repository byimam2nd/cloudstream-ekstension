name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Fast checkout (5s)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: "src"

      - name: Checkout builds
        uses: actions/checkout@v4
        with:
          ref: "builds"
          fetch-depth: 1
          path: "builds"

      - name: Clean old builds
        run: rm -f $GITHUB_WORKSPACE/builds/*.{cs3,jar,apk} 2>/dev/null || true

      # Cache Gradle (10s restore vs 30s download)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Setup JDK (10s)
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: adopt
          cache: gradle

      # Minimal Android SDK (10s vs 30s)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-licenses: true

      - name: Create local.properties
        run: cd $GITHUB_WORKSPACE/src && touch local.properties

      # Build all extensions (60-90s)
      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson \
            --no-daemon \
            --console=plain \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.workers.max=4

          # Copy artifacts
          find . -name "*.cs3" -exec cp {} $GITHUB_WORKSPACE/builds/ \;
          find . -name "*.jar" -exec cp {} $GITHUB_WORKSPACE/builds/ \;
          find . -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/builds/ \;
          cp build/plugins.json $GITHUB_WORKSPACE/builds/ 2>/dev/null || true

          echo "=== Build artifacts ==="
          ls -la $GITHUB_WORKSPACE/builds/

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m "Build ${{ github.sha }} [${{ github.run_number }}]" || exit 0
          git push
