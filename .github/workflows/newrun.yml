name: CloudStream Optimized CI

on:
  push:
    branches: [ main, master ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:

  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: builds
          path: builds
        continue-on-error: true

      - id: set
        run: |
          set -e

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # Ambil folder level pertama yang berubah
          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" | cut -d/ -f1 | sort -u)

          # Ambil semua module dari settings.gradle.kts
          ALL_MODULES=$(grep 'include' settings.gradle.kts | sed -E 's/.*"(.*)".*/\1/')

          BUILD_LIST=""

          for module in $ALL_MODULES; do
            if [ -f "builds/$module.cs3" ] || [ -f "builds/$module.jar" ]; then
              EXISTS=true
            else
              EXISTS=false
            fi

            if echo "$CHANGED" | grep -q "^$module$" || [ "$EXISTS" = false ]; then
              BUILD_LIST="$BUILD_LIST $module"
            fi
          done

          UNIQUE=$(printf "%s\n" $BUILD_LIST | sort -u | sed '/^$/d')

          if [ -z "$UNIQUE" ]; then
            echo "matrix=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON=$(printf '%s\n' $UNIQUE | jq -R . | jq -s -c .)

          echo "matrix={\"module\":$JSON}" >> "$GITHUB_OUTPUT"


  build:
    needs: detect
    if: needs.detect.outputs.matrix != ''
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build Module
        run: |
          chmod +x gradlew
          ./gradlew :${{ matrix.module }}:make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}
          path: |
            ${{ matrix.module }}/build/*.cs3
            ${{ matrix.module }}/build/*.jar


  publish:
    needs: [detect, build]
    if: needs.detect.outputs.matrix != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: builds
          path: builds
        continue-on-error: true

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: src

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Regenerate plugins.json
        working-directory: src
        run: |
          chmod +x gradlew
          ./gradlew makePluginsJson

      - name: Move plugins.json
        run: |
          cp src/build/plugins.json builds/

      - name: Commit Once
        working-directory: builds
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"

          git add .
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "CI Build @ $GITHUB_SHA"
          git push origin HEAD:builds --force