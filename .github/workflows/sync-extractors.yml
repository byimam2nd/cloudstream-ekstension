name: Sync Master Extractors

# SEPARATE concurrency group from Build workflow
concurrency:
  group: "sync-extractors"
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/MasterExtractors.kt'
  pull_request:
    branches: [ master ]
    paths:
      - 'docs/MasterExtractors.kt'
  workflow_dispatch:

jobs:
  sync-extractors:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Sync Master Extractors to all sites
      run: |
        echo "📦 Syncing Master Extractors to all sites..."

        # Master Extractors file location
        MASTER_FILE="docs/MasterExtractors.kt"

        # Check if master file exists
        if [ ! -f "$MASTER_FILE" ]; then
          echo "❌ Master Extractors file not found at $MASTER_FILE"
          exit 1
        fi

        # Site to folder mapping (folder name may differ from site name)
        declare -A SITE_FOLDERS=(
          ["Pencurimovie"]="Pencurimovie"
          ["LayarKaca21"]="LayarKacaProvider"
          ["Donghuastream"]="Donghuastream"
          ["Funmovieslix"]="Funmovieslix"
          ["HiAnime"]="HiAnime"
          ["IdlixProvider"]="hexated"
          ["Anichin"]="Anichin"
        )

        # Copy to each site
        for SITE in "${!SITE_FOLDERS[@]}"; do
          FOLDER="${SITE_FOLDERS[$SITE]}"
          echo ""
          echo "📋 Copying to $SITE (folder: $FOLDER)..."

          # Destination directory
          DEST_DIR="$SITE/src/main/kotlin/com/$FOLDER"
          DEST_FILE="$DEST_DIR/Extractors.kt"

          # Create directory if not exists
          mkdir -p "$DEST_DIR"

          # Copy master extractors with correct package name
          # Using awk for better package replacement
          awk -v folder="$FOLDER" '
            NR==1 { print "// ========================================" }
            NR==2 { print "// AUTO-GENERATED - DO NOT EDIT MANUALLY" }
            NR==3 { print "// Synced from docs/MasterExtractors.kt" }
            NR==4 { print "// ========================================" }
            /^package / { print "package com." folder; next }
            { print }
          ' "$MASTER_FILE" > "$DEST_FILE"

          # Count extractor classes
          CLASS_COUNT=$(grep -c "^class \|^open class " "$DEST_FILE" 2>/dev/null || echo 0)
          echo "✅ Copied Master Extractors to $SITE/$FOLDER ($CLASS_COUNT classes)"
        done

        echo ""
        echo "✅ Sync completed!"

    - name: Verify extractor files
      run: |
        echo ""
        echo "🔍 Verifying extractor files..."
        echo ""
        echo "Files created/updated:"
        find . -path "*/src/main/kotlin/com/*/Extractors.kt" -type f | while read file; do
          COUNT=$(grep -c "^class \|^open class " "$file" 2>/dev/null || echo 0)
          echo "  📄 $file ($COUNT classes)"
        done

    - name: Commit and push if changes exist
      run: |
        echo ""
        echo "🔄 Checking for changes to commit..."
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        if ! git diff --quiet; then
          echo "Changes detected, committing..."
          git add -A
          git commit -m "chore: auto-sync extractors from MasterExtractors.kt [skip ci]"
          git push
          echo "✅ Changes pushed successfully"
        else
          echo "✅ No changes to commit"
        fi
