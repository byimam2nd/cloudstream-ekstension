name: Sync Master Extractors

# SEPARATE concurrency group from Build workflow
concurrency:
  group: "sync-extractors"
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/MasterExtractors.kt'
  pull_request:
    branches: [ master ]
    paths:
      - 'docs/MasterExtractors.kt'
  workflow_dispatch:

jobs:
  sync-extractors:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect active modules dynamically
      id: detect-modules
      run: |
        echo "🔍 Detecting active modules (folders with build.gradle.kts)..."

        # Find all folders with build.gradle.kts (excluding root)
        MODULES=""
        for build_file in $(find . -maxdepth 2 -name "build.gradle.kts" | grep -v "^./build.gradle.kts"); do
          module_dir=$(dirname "$build_file" | sed 's|^\./||')
          MODULES="$MODULES $module_dir"
        done

        # Trim leading space
        MODULES=$(echo $MODULES | xargs)

        echo "MODULES=$MODULES"
        echo "modules=$MODULES" >> $GITHUB_OUTPUT

        MODULE_COUNT=$(echo $MODULES | wc -w)
        echo "module_count=$MODULE_COUNT" >> $GITHUB_OUTPUT

        echo "✅ Found $MODULE_COUNT active module(s): $MODULES"

    - name: Sync Master Extractors to all active sites
      run: |
        echo "📦 Syncing Master Extractors to all active sites..."

        # Master Extractors file location
        MASTER_FILE="docs/MasterExtractors.kt"

        # Check if master file exists
        if [ ! -f "$MASTER_FILE" ]; then
          echo "❌ Master Extractors file not found at $MASTER_FILE"
          exit 1
        fi

        # Dynamic folder to package mapping
        # Only for modules that exist (have build.gradle.kts)
        # Format: "folder"="subfolder:package"
        declare -A FOLDER_CONFIGS=(
          ["Pencurimovie"]="Pencurimovie:pencurimovie"
          ["LayarKaca21"]="LayarKacaProvider:layarKacaProvider"
          ["Donghuastream"]="Donghuastream:donghuastream"
          ["Funmovieslix"]="Funmovieslix:funmovieslix"
          ["IdlixProvider"]="hexated:hexated"
          ["Anichin"]="Anichin:anichin"
        )

        # Get active modules from previous step
        MODULES="${{ steps.detect-modules.outputs.modules }}"
        
        echo "📋 Active modules: $MODULES"
        echo ""

        # Copy to each active module only
        for MODULE in $MODULES; do
          # Skip if module not in our config (shouldn't happen, but safety check)
          if [ -z "${FOLDER_CONFIGS[$MODULE]}" ]; then
            echo "⚠️  Warning: Module '$MODULE' not in config, skipping..."
            continue
          fi
          
          IFS=':' read -r FOLDER PACKAGE <<< "${FOLDER_CONFIGS[$MODULE]}"
          echo ""
          echo "📋 Syncing to $MODULE (folder: com/$FOLDER, package: com.$PACKAGE)..."

          # Destination directory and file
          DEST_DIR="$MODULE/src/main/kotlin/com/$FOLDER"
          DEST_FILE="$DEST_DIR/Extractors.kt"

          # Check if source folder exists
          if [ ! -d "$DEST_DIR" ]; then
            echo "❌ Error: Source directory not found: $DEST_DIR"
            echo "   Make sure the folder structure is correct for module: $MODULE"
            exit 1
          fi

          # Copy master extractors with correct package name
          # Using awk for better package replacement
          awk -v pkg="$PACKAGE" '
            NR==1 { print "// ========================================" }
            NR==2 { print "// AUTO-GENERATED - DO NOT EDIT MANUALLY" }
            NR==3 { print "// Synced from docs/MasterExtractors.kt" }
            NR==4 { print "// ========================================" }
            /^package / { print "package com." pkg; next }
            { print }
          ' "$MASTER_FILE" > "$DEST_FILE"

          # Count extractor classes
          CLASS_COUNT=$(grep -c "^class \|^open class " "$DEST_FILE" 2>/dev/null || echo 0)
          echo "✅ Synced: $MODULE/$FOLDER ($CLASS_COUNT extractor classes)"
        done

        echo ""
        echo "✅ Sync completed!"
        echo "📊 Summary: Synced Master Extractors to $(echo $MODULES | wc -w) active module(s)"

    - name: Verify extractor files
      run: |
        echo ""
        echo "🔍 Verifying extractor files..."
        echo ""

        MODULES="${{ steps.detect-modules.outputs.modules }}"
        MODULE_COUNT=$(echo $MODULES | wc -w)
        VALID_COUNT=0
        ERRORS=0

        # Folder to package mapping for validation
        declare -A FOLDER_MAP=(
          ["Pencurimovie"]="Pencurimovie"
          ["LayarKaca21"]="LayarKacaProvider"
          ["Donghuastream"]="Donghuastream"
          ["Funmovieslix"]="Funmovieslix"
          ["IdlixProvider"]="hexated"
          ["Anichin"]="Anichin"
        )

        for MODULE in $MODULES; do
          FOLDER="${FOLDER_MAP[$MODULE]}"
          if [ -z "$FOLDER" ]; then
            echo "⚠️  Warning: Module '$MODULE' not in folder map, skipping validation..."
            continue
          fi

          EXTRACTORS_FILE="$MODULE/src/main/kotlin/com/$FOLDER/Extractors.kt"

          if [ ! -f "$EXTRACTORS_FILE" ]; then
            echo "❌ ERROR: Extractors.kt not found: $EXTRACTORS_FILE"
            ERRORS=$((ERRORS + 1))
            continue
          fi

          # Count extractor classes
          CLASS_COUNT=$(grep -c "^class \|^open class " "$EXTRACTORS_FILE" 2>/dev/null || echo 0)

          # Count registered extractors in AllExtractors object
          REGISTERED_COUNT=$(grep -A 100 "object AllExtractors" "$EXTRACTORS_FILE" | grep -c "()" 2>/dev/null || echo 0)

          echo "✅ $MODULE: $CLASS_COUNT classes, $REGISTERED_COUNT registered"

          if [ "$CLASS_COUNT" -gt 0 ]; then
            VALID_COUNT=$((VALID_COUNT + 1))
          fi
        done

        echo ""
        echo "📊 Validation Summary:"
        echo "   Total modules: $MODULE_COUNT"
        echo "   Valid extractors: $VALID_COUNT"
        echo "   Errors: $ERRORS"

        if [ "$ERRORS" -gt 0 ]; then
          echo ""
          echo "❌ Validation FAILED: $ERRORS module(s) missing Extractors.kt"
          exit 1
        fi

        if [ "$VALID_COUNT" -eq 0 ]; then
          echo ""
          echo "❌ Validation FAILED: No valid extractor files found"
          exit 1
        fi

        echo ""
        echo "✅ Validation PASSED: All $VALID_COUNT module(s) have valid Extractors.kt"

    - name: Commit and push if changes exist
      run: |
        echo ""
        echo "🔄 Checking for changes to commit..."
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        if ! git diff --quiet; then
          echo "Changes detected, committing..."
          git add -A
          git commit -m "chore: auto-sync extractors from MasterExtractors.kt [skip ci]"
          git push
          echo "✅ Changes pushed successfully"
        else
          echo "✅ No changes to commit"
        fi
