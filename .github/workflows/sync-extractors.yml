name: Sync Master Extractors

# SEPARATE concurrency group from Build workflow
concurrency:
  group: "sync-extractors"
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
    paths:
      - 'common/MasterExtractors.kt'
  pull_request:
    branches: [ master ]
    paths:
      - 'common/MasterExtractors.kt'
  workflow_dispatch:

jobs:
  sync-extractors:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect active modules dynamically
      id: detect-modules
      run: |
        echo "🔍 Detecting active modules (folders with build.gradle.kts)..."

        # Find all folders with build.gradle.kts (excluding root)
        MODULES=""
        for build_file in $(find . -maxdepth 2 -name "build.gradle.kts" | grep -v "^./build.gradle.kts"); do
          module_dir=$(dirname "$build_file" | sed 's|^\./||')
          MODULES="$MODULES $module_dir"
        done

        # Trim leading space
        MODULES=$(echo $MODULES | xargs)

        echo "MODULES=$MODULES"
        echo "modules=$MODULES" >> $GITHUB_OUTPUT

        MODULE_COUNT=$(echo $MODULES | wc -w)
        echo "module_count=$MODULE_COUNT" >> $GITHUB_OUTPUT

        echo "✅ Found $MODULE_COUNT active module(s): $MODULES"

    - name: Sync Master Extractors to all active sites
      run: |
        echo "📦 Syncing Master Extractors to all active sites..."

        # Master Extractors file location
        MASTER_FILE="common/MasterExtractors.kt"

        # Check if master file exists
        if [ ! -f "$MASTER_FILE" ]; then
          echo "❌ Master Extractors file not found at $MASTER_FILE"
          exit 1
        fi

        # Get active modules from previous step
        MODULES="${{ steps.detect-modules.outputs.modules }}"

        echo "📋 Active modules: $MODULES"
        echo ""

        # Copy to each active module
        for MODULE in $MODULES; do
          echo ""
          echo "📋 Processing $MODULE..."

          # Auto-detect: Find the actual folder structure
          # Look for folders in src/main/kotlin/com/
          SRC_DIR="$MODULE/src/main/kotlin/com"

          if [ ! -d "$SRC_DIR" ]; then
            echo "❌ Error: Source directory not found: $SRC_DIR"
            exit 1
          fi

          # Get the actual folder name(s) in com/
          FOLDERS=$(ls -1 "$SRC_DIR" 2>/dev/null)
          FOLDER_COUNT=$(echo "$FOLDERS" | wc -l)

          if [ "$FOLDER_COUNT" -eq 0 ]; then
            echo "❌ Error: No folders found in $SRC_DIR"
            exit 1
          fi

          # If multiple folders, find the one with Provider/Plugin file
          if [ "$FOLDER_COUNT" -gt 1 ]; then
            TARGET_FOLDER=""
            for folder in $FOLDERS; do
              if ls "$SRC_DIR/$folder"/*Plugin*.kt 1>/dev/null 2>&1 || \
                 ls "$SRC_DIR/$folder"/*Provider*.kt 1>/dev/null 2>&1; then
                TARGET_FOLDER="$folder"
                break
              fi
            done

            if [ -z "$TARGET_FOLDER" ]; then
              echo "⚠️  Warning: No folder with Provider/Plugin found, using first folder"
              TARGET_FOLDER=$(echo "$FOLDERS" | head -1)
            fi

            FOLDER="$TARGET_FOLDER"
          else
            FOLDER="$FOLDERS"
          fi

          # Trim whitespace
          FOLDER=$(echo "$FOLDER" | xargs)

          echo "   Found folder: com.$FOLDER"

          # Auto-detect: Extract package name from Provider/Plugin file
          PACKAGE=""
          for pattern in "*Plugin.kt" "*ProviderPlugin.kt" "*Provider.kt"; do
            provider_file=$(ls "$SRC_DIR/$FOLDER"/$pattern 2>/dev/null | head -1)
            if [ -n "$provider_file" ] && [ -f "$provider_file" ]; then
              # Extract package declaration
              pkg_line=$(head -5 "$provider_file" | grep "^package ")
              if [ -n "$pkg_line" ]; then
                # Extract package name (last part after com.)
                PACKAGE=$(echo "$pkg_line" | sed 's/package com\.\?//')
                break
              fi
            fi
          done

          if [ -z "$PACKAGE" ]; then
            echo "⚠️  Warning: Could not detect package, using folder name (lowercase)"
            PACKAGE=$(echo "$FOLDER" | tr '[:upper:]' '[:lower:]')
          fi

          echo "   Detected package: $PACKAGE"

          # Destination directory and file
          DEST_DIR="$MODULE/src/main/kotlin/com/$FOLDER"
          DEST_FILE="$DEST_DIR/Extractors.kt"

          # Check if source folder exists
          if [ ! -d "$DEST_DIR" ]; then
            echo "❌ Error: Source directory not found: $DEST_DIR"
            exit 1
          fi

          # Copy master extractors with correct package name
          awk -v pkg="$PACKAGE" '
            NR==1 { print "// ========================================" }
            NR==2 { print "// AUTO-GENERATED - DO NOT EDIT MANUALLY" }
            NR==3 { print "// Synced from common/MasterExtractors.kt" }
            NR==4 { print "// ========================================" }
            /^package / { print "package com." pkg; next }
            { print }
          ' "$MASTER_FILE" > "$DEST_FILE"

          # Count extractor classes
          CLASS_COUNT=$(grep -c "^class \|^open class " "$DEST_FILE" 2>/dev/null || echo 0)
          echo "   ✅ Synced: $MODULE/$FOLDER ($CLASS_COUNT extractor classes)"
        done

        echo ""
        echo "✅ Sync completed!"
        echo "📊 Summary: Synced Master Extractors to $(echo $MODULES | wc -w) active module(s)"

    - name: Verify extractor files
      run: |
        echo ""
        echo "🔍 Verifying extractor files..."
        echo ""

        MODULES="${{ steps.detect-modules.outputs.modules }}"
        MODULE_COUNT=$(echo $MODULES | wc -w)
        VALID_COUNT=0
        ERRORS=0

        for MODULE in $MODULES; do
          echo "📋 Validating $MODULE..."

          # Auto-detect folder structure
          SRC_DIR="$MODULE/src/main/kotlin/com"

          if [ ! -d "$SRC_DIR" ]; then
            echo "   ❌ ERROR: Source directory not found: $SRC_DIR"
            ERRORS=$((ERRORS + 1))
            continue
          fi

          # Get folder name
          FOLDERS=$(ls -1 "$SRC_DIR" 2>/dev/null)
          FOLDER_COUNT=$(echo "$FOLDERS" | wc -l)

          if [ "$FOLDER_COUNT" -gt 1 ]; then
            # Find folder with Provider/Plugin
            TARGET_FOLDER=""
            for folder in $FOLDERS; do
              if ls "$SRC_DIR/$folder"/*Plugin*.kt 1>/dev/null 2>&1 || \
                 ls "$SRC_DIR/$folder"/*Provider*.kt 1>/dev/null 2>&1; then
                TARGET_FOLDER="$folder"
                break
              fi
            done
            FOLDER="${TARGET_FOLDER:-$(echo "$FOLDERS" | head -1)}"
          else
            FOLDER="$FOLDERS"
          fi

          FOLDER=$(echo "$FOLDER" | xargs)
          echo "   Found folder: com.$FOLDER"

          EXTRACTORS_FILE="$MODULE/src/main/kotlin/com/$FOLDER/Extractors.kt"

          # Find Provider file - prioritize Plugin files
          PROVIDER_FILE=$(find "$MODULE/src/main/kotlin/com/$FOLDER" -maxdepth 1 -name "*Plugin.kt" 2>/dev/null | head -1)
          if [ -z "$PROVIDER_FILE" ]; then
            PROVIDER_FILE=$(find "$MODULE/src/main/kotlin/com/$FOLDER" -maxdepth 1 -name "*Provider.kt" 2>/dev/null | grep -v "MainAPI" | head -1)
          fi

          echo "   Provider: $(basename "$PROVIDER_FILE" 2>/dev/null || echo 'NOT FOUND')"

          # Check 1: Extractors.kt exists
          if [ ! -f "$EXTRACTORS_FILE" ]; then
            echo "   ❌ ERROR: Extractors.kt not found: $EXTRACTORS_FILE"
            ERRORS=$((ERRORS + 1))
            continue
          fi
          echo "   ✅ Extractors.kt exists"

          # Check 2: Count extractor classes
          CLASS_COUNT=$(grep -c "^class \|^open class " "$EXTRACTORS_FILE" 2>/dev/null || echo 0)
          echo "   ✅ Extractor classes: $CLASS_COUNT"

          # Check 3: AllExtractors object exists
          if ! grep -q "object AllExtractors" "$EXTRACTORS_FILE" 2>/dev/null; then
            echo "   ❌ ERROR: AllExtractors object not found in Extractors.kt"
            ERRORS=$((ERRORS + 1))
            continue
          fi
          echo "   ✅ AllExtractors object exists"

          # Check 4: Count registered extractors
          REGISTERED_COUNT=$(grep -A 100 "object AllExtractors" "$EXTRACTORS_FILE" | grep -c "()" 2>/dev/null || echo 0)
          echo "   ✅ Registered extractors: $REGISTERED_COUNT"

          # Check 5: Provider file exists
          if [ -z "$PROVIDER_FILE" ] || [ ! -f "$PROVIDER_FILE" ]; then
            echo "   ❌ ERROR: Provider file not found"
            ERRORS=$((ERRORS + 1))
            continue
          fi
          echo "   ✅ Provider file exists"

          # Check 6: Provider imports AllExtractors OR uses fully qualified name
          if ! grep -q "import.*AllExtractors" "$PROVIDER_FILE" 2>/dev/null && \
             ! grep -q "com\..*\.AllExtractors" "$PROVIDER_FILE" 2>/dev/null; then
            echo "   ❌ ERROR: Provider does not import AllExtractors"
            ERRORS=$((ERRORS + 1))
            continue
          fi
          echo "   ✅ Provider imports AllExtractors (or uses fully qualified name)"

          # Check 7: Provider uses AllExtractors.list.forEach (direct or fully qualified)
          if ! grep -q "AllExtractors\.list\.forEach" "$PROVIDER_FILE" 2>/dev/null && \
             ! grep -q "com\..*\.AllExtractors\.list\.forEach" "$PROVIDER_FILE" 2>/dev/null; then
            echo "   ❌ ERROR: Provider does not use AllExtractors.list.forEach"
            ERRORS=$((ERRORS + 1))
            continue
          fi
          echo "   ✅ Provider uses AllExtractors.list.forEach"

          # Check 8: Validate class count vs registered count
          if [ "$CLASS_COUNT" -lt "$REGISTERED_COUNT" ]; then
            echo "   ⚠️  WARNING: Registered count ($REGISTERED_COUNT) > Class count ($CLASS_COUNT)"
          fi

          # Consistency check - expect ~39 classes
          if [ "$CLASS_COUNT" -lt 30 ]; then
            echo "   ⚠️  WARNING: Low extractor count ($CLASS_COUNT), expected ~39"
          fi

          echo "   ✅ $MODULE validation PASSED"
          echo ""

          VALID_COUNT=$((VALID_COUNT + 1))
        done

        echo "========================================"
        echo "📊 Validation Summary"
        echo "========================================"
        echo "   Total modules: $MODULE_COUNT"
        echo "   Validated: $VALID_COUNT"
        echo "   Errors: $ERRORS"
        echo ""

        if [ "$ERRORS" -gt 0 ]; then
          echo "❌ Validation FAILED: $ERRORS error(s) found"
          exit 1
        fi

        if [ "$VALID_COUNT" -eq 0 ]; then
          echo "❌ Validation FAILED: No modules validated"
          exit 1
        fi

        echo "✅ Validation PASSED: All $VALID_COUNT module(s) correctly use Extractors.kt"

    - name: Commit and push if changes exist
      run: |
        echo ""
        echo "🔄 Checking for changes to commit..."
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        if ! git diff --quiet; then
          echo "Changes detected, committing..."
          git add -A
          git commit -m "chore: auto-sync extractors from MasterExtractors.kt [skip ci]"
          git push
          echo "✅ Changes pushed successfully"
        else
          echo "✅ No changes to commit"
        fi
