name: CI/CD - Build & Deploy

# Workflow optimized for Standalone & Persistent Providers (v4.0+)
concurrency:
  group: "ci-cd"
  cancel-in-progress: true

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  # ========================================
  # SINGLE JOB: BUILD ALL PROVIDERS
  # ========================================
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout builds branch
        uses: actions/checkout@v5
        with:
          ref: "builds"
          path: "builds_dir"

      - name: Clean old builds
        run: |
          rm builds_dir/*.cs3 2>/dev/null || true
          rm builds_dir/*.jar 2>/dev/null || true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: adopt
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        run: |
          chmod +x ./gradlew
          # Generate .cs3 files for all modules
          ./gradlew make --no-daemon --stacktrace
          # Generate plugins.json
          ./gradlew makePluginsJson --no-daemon --stacktrace
          # Ensure jar compatibility
          ./gradlew ensureJarCompatibility --no-daemon --stacktrace || true
          
          # Copy artifacts to builds directory
          cp **/build/*.cs3 builds_dir/ 2>/dev/null || true
          cp **/build/*.jar builds_dir/ 2>/dev/null || true
          cp build/plugins.json builds_dir/ 2>/dev/null || true

      - name: Push Build Artifacts
        run: |
          cd builds_dir
          echo "📋 Final artifacts list:"
          ls -la *.cs3 *.jar plugins.json 2>/dev/null || echo "No artifacts found"

          if ls *.cs3 1> /dev/null 2>&1; then
            git config --local user.email "actions@github.com"
            git config --local user.name "GitHub Actions"
            
            git add *.cs3 *.jar plugins.json 2>/dev/null || true
            
            if ! git diff --cached --quiet; then
              git commit -m "Build artifacts: $(date +'%Y-%m-%d %H:%M:%S')"
              git push origin builds
              echo "✅ Artifacts pushed to 'builds' branch"
            else
              echo "ℹ️ No changes detected in artifacts"
            fi
          else
            echo "❌ CRITICAL: No .cs3 artifacts found. Build failed."
            exit 1
          fi
