name: Sync Common Files

# Sync Master Common Files to all modules
concurrency:
  group: "sync-common-files"
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/MasterCacheManager.kt'
      - 'docs/MasterSmartCacheMonitor.kt'
      - 'docs/MasterImageCache.kt'
      - 'docs/MasterSuperSmartPrefetchManager.kt'
      - 'docs/MasterUtils.kt'
  pull_request:
    branches: [ master ]
    paths:
      - 'docs/MasterCacheManager.kt'
      - 'docs/MasterSmartCacheMonitor.kt'
      - 'docs/MasterImageCache.kt'
      - 'docs/MasterSuperSmartPrefetchManager.kt'
      - 'docs/MasterUtils.kt'
  workflow_dispatch:

jobs:
  sync-common-files:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect active modules dynamically
      id: detect-modules
      run: |
        echo "🔍 Detecting active modules (folders with build.gradle.kts)..."

        # Find all folders with build.gradle.kts (excluding root)
        MODULES=""
        for build_file in $(find . -maxdepth 2 -name "build.gradle.kts" | grep -v "^./build.gradle.kts"); do
          module_dir=$(dirname "$build_file" | sed 's|^\./||')
          MODULES="$MODULES $module_dir"
        done

        # Trim leading space
        MODULES=$(echo $MODULES | xargs)

        echo "MODULES=$MODULES"
        echo "modules=$MODULES" >> $GITHUB_OUTPUT

        MODULE_COUNT=$(echo $MODULES | wc -w)
        echo "module_count=$MODULE_COUNT" >> $GITHUB_OUTPUT

        echo "✅ Found $MODULE_COUNT active module(s): $MODULES"

    - name: Sync Master Common Files to all active modules
      run: |
        echo "📦 Syncing Master Common Files to all active modules..."

        # Master files location
        DOCS_DIR="docs"
        
        MASTER_FILES=(
          "MasterCacheManager.kt:CacheManager.kt"
          "MasterSmartCacheMonitor.kt:SmartCacheMonitor.kt"
          "MasterImageCache.kt:ImageCache.kt"
          "MasterSuperSmartPrefetchManager.kt:SuperSmartPrefetchManager.kt"
          "MasterUtils.kt:Utils.kt"
        )

        # Get active modules from previous step
        MODULES="${{ steps.detect-modules.outputs.modules }}"

        echo "📋 Active modules: $MODULES"
        echo ""

        # Sync to each active module
        for MODULE in $MODULES; do
          echo ""
          echo "📋 Processing $MODULE..."

          # Auto-detect: Find the actual folder structure
          SRC_DIR="$MODULE/src/main/kotlin/com"

          if [ ! -d "$SRC_DIR" ]; then
            echo "❌ Error: Source directory not found: $SRC_DIR"
            exit 1
          fi

          # Get the actual folder name(s) in com/
          FOLDERS=$(ls -1 "$SRC_DIR" 2>/dev/null)
          FOLDER_COUNT=$(echo "$FOLDERS" | wc -l)

          if [ "$FOLDER_COUNT" -eq 0 ]; then
            echo "❌ Error: No folders found in $SRC_DIR"
            exit 1
          fi

          # If multiple folders, find the one with Provider/Plugin file
          if [ "$FOLDER_COUNT" -gt 1 ]; then
            TARGET_FOLDER=""
            for folder in $FOLDERS; do
              if ls "$SRC_DIR/$folder"/*Plugin*.kt 1>/dev/null 2>&1 || \
                 ls "$SRC_DIR/$folder"/*Provider*.kt 1>/dev/null 2>&1; then
                TARGET_FOLDER="$folder"
                break
              fi
            done

            if [ -z "$TARGET_FOLDER" ]; then
              echo "⚠️  Warning: No folder with Provider/Plugin found, using first folder"
              TARGET_FOLDER=$(echo "$FOLDERS" | head -1)
            fi

            FOLDER="$TARGET_FOLDER"
          else
            FOLDER="$FOLDERS"
          fi

          # Trim whitespace
          FOLDER=$(echo "$FOLDER" | xargs)

          echo "   Found folder: com.$FOLDER"

          # Auto-detect: Extract package name from Plugin/Provider file
          PACKAGE=""
          for pattern in "*Plugin.kt" "*ProviderPlugin.kt" "*Provider.kt"; do
            provider_file=$(ls "$SRC_DIR/$FOLDER"/$pattern 2>/dev/null | head -1)
            if [ -n "$provider_file" ] && [ -f "$provider_file" ]; then
              # Extract package declaration
              pkg_line=$(head -5 "$provider_file" | grep "^package ")
              if [ -n "$pkg_line" ]; then
                # Extract package name (last part after com.)
                PACKAGE=$(echo "$pkg_line" | sed 's/package com\.\?//')
                break
              fi
            fi
          done

          if [ -z "$PACKAGE" ]; then
            echo "⚠️  Warning: Could not detect package, using folder name (lowercase)"
            PACKAGE=$(echo "$FOLDER" | tr '[:upper:]' '[:lower:]')
          fi

          echo "   Detected package: $PACKAGE"

          # Destination directory
          DEST_DIR="$MODULE/src/main/kotlin/com/$FOLDER"

          # Check if source folder exists
          if [ ! -d "$DEST_DIR" ]; then
            echo "❌ Error: Destination directory not found: $DEST_DIR"
            exit 1
          fi

          # Sync each master file
          for master_pair in "${MASTER_FILES[@]}"; do
            MASTER_FILE="${master_pair%%:*}"
            OUTPUT_FILE="${master_pair##*:}"
            
            MASTER_PATH="$DOCS_DIR/$MASTER_FILE"
            OUTPUT_PATH="$DEST_DIR/$OUTPUT_FILE"

            if [ ! -f "$MASTER_PATH" ]; then
              echo "❌ Error: Master file not found: $MASTER_PATH"
              exit 1
            fi

            # Replace {MODULE} placeholder with actual package name
            sed "s/{MODULE}/$PACKAGE/g" "$MASTER_PATH" > "$OUTPUT_PATH"

            echo "   ✅ Synced: $OUTPUT_FILE"
          done
        done

        echo ""
        echo "✅ Sync completed!"
        echo "📊 Summary: Synced Master Common Files to $(echo $MODULES | wc -w) active module(s)"

    - name: Verify common files
      run: |
        echo ""
        echo "🔍 Verifying common files..."
        echo ""

        MODULES="${{ steps.detect-modules.outputs.modules }}"
        MODULE_COUNT=$(echo $MODULES | wc -w)
        VALID_COUNT=0
        ERRORS=0

        COMMON_FILES=(
          "CacheManager.kt"
          "SmartCacheMonitor.kt"
          "ImageCache.kt"
          "SuperSmartPrefetchManager.kt"
          "Utils.kt"
        )

        for MODULE in $MODULES; do
          echo "📋 Validating $MODULE..."

          # Auto-detect folder structure
          SRC_DIR="$MODULE/src/main/kotlin/com"

          if [ ! -d "$SRC_DIR" ]; then
            echo "   ❌ ERROR: Source directory not found: $SRC_DIR"
            ERRORS=$((ERRORS + 1))
            continue
          fi

          # Get folder name
          FOLDERS=$(ls -1 "$SRC_DIR" 2>/dev/null)
          FOLDER_COUNT=$(echo "$FOLDERS" | wc -l)

          if [ "$FOLDER_COUNT" -gt 1 ]; then
            # Find folder with Provider/Plugin
            TARGET_FOLDER=""
            for folder in $FOLDERS; do
              if ls "$SRC_DIR/$folder"/*Plugin*.kt 1>/dev/null 2>&1 || \
                 ls "$SRC_DIR/$folder"/*Provider*.kt 1>/dev/null 2>&1; then
                TARGET_FOLDER="$folder"
                break
              fi
            done
            FOLDER="${TARGET_FOLDER:-$(echo "$FOLDERS" | head -1)}"
          else
            FOLDER="$FOLDERS"
          fi

          FOLDER=$(echo "$FOLDER" | xargs)
          echo "   Found folder: com.$FOLDER"

          # Check each common file
          for COMMON_FILE in "${COMMON_FILES[@]}"; do
            FILE_PATH="$MODULE/src/main/kotlin/com/$FOLDER/$COMMON_FILE"

            # Check if file exists
            if [ ! -f "$FILE_PATH" ]; then
              echo "   ❌ ERROR: $COMMON_FILE not found: $FILE_PATH"
              ERRORS=$((ERRORS + 1))
              continue
            fi
            echo "   ✅ $COMMON_FILE exists"

            # Check if file has correct package
            if ! head -5 "$FILE_PATH" | grep -q "^package com\\.$FOLDER"; then
              echo "   ⚠️  WARNING: $COMMON_FILE package might be incorrect"
            fi
          done

          echo "   ✅ $MODULE validation PASSED"
          echo ""

          VALID_COUNT=$((VALID_COUNT + 1))
        done

        echo "========================================"
        echo "📊 Validation Summary"
        echo "========================================"
        echo "   Total modules: $MODULE_COUNT"
        echo "   Validated: $VALID_COUNT"
        echo "   Errors: $ERRORS"
        echo ""

        if [ "$ERRORS" -gt 0 ]; then
          echo "❌ Validation FAILED: $ERRORS error(s) found"
          exit 1
        fi

        if [ "$VALID_COUNT" -eq 0 ]; then
          echo "❌ Validation FAILED: No modules validated"
          exit 1
        fi

        echo "✅ Validation PASSED: All $VALID_COUNT module(s) have common files"

    - name: Commit and push if changes exist
      run: |
        echo ""
        echo "🔄 Checking for changes to commit..."
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        if ! git diff --quiet; then
          echo "Changes detected, committing..."
          git add -A
          git commit -m "chore: auto-sync common files from Master files [skip ci]"
          git push
          echo "✅ Changes pushed successfully"
        else
          echo "✅ No changes to commit"
        fi
